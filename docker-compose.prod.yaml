version: '3.8'

services:
  # Nginx acts as a reverse proxy, and is the only service exposed to the internet.
  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
      - "443:443" # Enable for HTTPS
    volumes:
      # Mount the production Nginx configuration
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount SSL certificates for HTTPS
      # - /path/to/your/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  frontend:
    # Use a specific, versioned image from your container registry
    image: your-registry/lab-actions-frontend:1.0.1
    restart: always
    environment:
      # This should be set to your backend's public API endpoint.
      # It's often best to build this into the image, but can be set here.
      - NEXT_PUBLIC_API_URL=https://app.example.com/api
    networks:
      - app-network
    # No ports are exposed directly to the host machine.

  backend:
    # Use a specific, versioned image from your container registry
    image: your-registry/lab-actions-backend:1.0.1
    restart: always
    environment:
      # These secrets MUST be injected by your deployment environment (e.g., EC2 user data, ECS secrets, etc.).
      # The ${VAR} syntax reads from the host's environment variables.
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/labdb?authSource=admin
      - SPRING_DATA_MONGODB_DATABASE=labdb
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - FRONTEND_URL=https://app.example.com
      - JAVA_TOOL_OPTIONS=-Xms256m -Xmx512m
    depends_on:
      - mongo
      - redis
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo:6.0
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  redis:
    image: redis:7.0-alpine
    restart: always
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
version: '3.9'

services:
  # ====== 1. REDIS SERVICE ======
  # In-memory caching layer optimized for production
  redis:
    image: redis:7.0-alpine
    container_name: redis-container-prod
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --tcp-keepalive 300
    user: redis
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 150M
        reservations:
          cpus: '0.05'
          memory: 80M
    volumes:
      - ./redis-data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ====== 2. BACKEND SERVICE - INSTANCE 1 ======
  # Primary backend with port 8082
  backend-1:
    image: anand7254/golden-pearl-backend:latest
    container_name: backend-1-prod
    environment:
      - SPRING_DATA_MONGODB_URI=${SPRING_DATA_MONGODB_URI}
      - SPRING_DATA_MONGODB_DATABASE=${SPRING_DATA_MONGODB_DATABASE}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FRONTEND_URL=${FRONTEND_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_CONTACTS=${ADMIN_CONTACTS}
      - SERVER_PORT=8082
      - JAVA_OPTS=-Xmx256m -Xms128m
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - app-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 250M
        reservations:
          cpus: '0.1'
          memory: 150M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ====== 3. BACKEND SERVICE - INSTANCE 2 ======
  # Secondary backend with port 8083
  backend-2:
    image: anand7254/golden-pearl-backend:latest
    container_name: backend-2-prod
    environment:
      - SPRING_DATA_MONGODB_URI=${SPRING_DATA_MONGODB_URI}
      - SPRING_DATA_MONGODB_DATABASE=${SPRING_DATA_MONGODB_DATABASE}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FRONTEND_URL=${FRONTEND_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_CONTACTS=${ADMIN_CONTACTS}
      - SERVER_PORT=8083
      - JAVA_OPTS=-Xmx256m -Xms128m
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - app-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 250M
        reservations:
          cpus: '0.1'
          memory: 150M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ====== 4. CERTBOT SERVICE ======
  # Automatic SSL certificate management with Let's Encrypt
  certbot:
    image: certbot/certbot:latest
    container_name: certbot-prod
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./letsencrypt:/var/lib/letsencrypt
      - ./nginx/certs:/etc/nginx/certs
    command: certonly --webroot --webroot-path=/var/www/certbot --email your-email@example.com --agree-tos --no-eff-email -d your-domain.com
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 50M
        reservations:
          cpus: '0.05'
          memory: 25M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ====== NGINX REVERSE PROXY & LOAD BALANCER ======
  nginx:
    image: nginx:1.25
    container_name: nginx-proxy-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - ./cache:/var/cache/nginx
      - ./letsencrypt:/etc/letsencrypt:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./certbot-webroot:/var/www/certbot:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - backend-1
      - backend-2
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 50M
        reservations:
          cpus: '0.05'
          memory: 25M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge
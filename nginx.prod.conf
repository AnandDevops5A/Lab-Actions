# ====== NGINX CONFIGURATION FOR PRODUCTION ======
# Load balancing between 2 backend instances
# Optimized for t2.micro instance

# Caching zone optimized for t2.micro
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:5m max_size=200m inactive=30m use_temp_path=off;

# Rate Limiting optimized for t2.micro
limit_req_zone $binary_remote_addr zone=api:5m rate=5r/s;
limit_req_zone $binary_remote_addr zone=general:5m rate=50r/s;

# Upstream backend pool - load balancing between 2 instances
upstream backend_pool {
    server backend-1:8082 max_fails=3 fail_timeout=30s;
    server backend-2:8083 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Performance enhancements optimized for t2.micro
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/x-font-ttf application/vnd.ms-fontobject;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # Client settings optimized for t2.micro
    client_max_body_size 10M;
    client_body_timeout 10;
    client_header_timeout 10;
    send_timeout 10;
    keepalive_timeout 65;
    keepalive_requests 100;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Proxy API requests to the load-balanced backend pool
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://backend_pool/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 15s;
        proxy_read_timeout 20s;
        proxy_buffering on;
        proxy_buffer_size 2k;
        proxy_buffers 8 2k;

        # Disable caching for API requests
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Default route
    location / {
        proxy_pass http://backend_pool/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

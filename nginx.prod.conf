# ====== NGINX CONFIGURATION FOR PRODUCTION ======
# Load balancing between 2 backend instances with SSL & security
# Optimized for t2.micro instance

# Caching zone optimized for t2.micro
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:5m max_size=200m inactive=30m use_temp_path=off;

# Rate Limiting optimized for t2.micro
limit_req_zone $binary_remote_addr zone=api:5m rate=5r/s;
limit_req_zone $binary_remote_addr zone=general:5m rate=50r/s;

# Upstream backend pool - load balancing between 2 instances
upstream backend_pool {
    server backend-1:8082 max_fails=3 fail_timeout=30s;
    server backend-2:8083 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name your-domain.com;

    # SSL Certificate paths (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://trusted-cdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https://api.trusted.com; font-src 'self' https://fonts.gstatic.com;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Performance enhancements optimized for t2.micro
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/x-font-ttf application/vnd.ms-fontobject;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # Client settings optimized for t2.micro
    client_max_body_size 10M;
    client_body_timeout 10;
    client_header_timeout 10;
    send_timeout 10;
    keepalive_timeout 65;
    keepalive_requests 100;

    # Certbot webroot challenge for SSL certificate validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Backend health check (Direct)
    location /backend-health {
        access_log off;
        proxy_pass http://backend_pool/actuator/health;
    }

    # Proxy API requests to the load-balanced backend pool
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://backend_pool/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 15s;
        proxy_read_timeout 20s;
        proxy_buffering on;
        proxy_buffer_size 2k;
        proxy_buffers 8 2k;

        # Disable caching for API requests
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Default route - API info
    location / {
        access_log off;
        return 200 "API Server is running\n";
        add_header Content-Type text/plain;
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}



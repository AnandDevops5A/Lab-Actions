# ====== NGINX CONFIGURATION FOR t2.micro ======
# Optimized for 2 backend instances with load balancing & caching

# Caching zone - optimized for t2.micro (limited disk space)
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=500m inactive=60m use_temp_path=off;

# Upstream backend pool - load balancing between 2 instances
upstream backend_pool {
    # backend-1 is the primary server.
    # backend-2 is a backup and will only receive requests if backend-1 fails.
    server backend-1:8082 max_fails=3 fail_timeout=30s;
    server backend-2:8083 max_fails=3 fail_timeout=30s backup;
}

# Rate limiting zone for API protection
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;
    client_max_body_size 100M;

    # ====== DEFAULT ROUTE ======
    location / {
        access_log off;
        return 200 "API Server is running\n";
        add_header Content-Type text/plain;
    }

    # ====== BACKEND API ROUTES (LOAD BALANCED) ======
    location /api/ {
        # Rate limiting for API protection
        limit_req zone=api_limit burst=20 nodelay;
        
        # Route to load-balanced backend pool
        proxy_pass http://backend_pool/;
        
        # Disable caching for API requests
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        
        # Headers for backend
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Timeouts optimized for t2.micro
        proxy_connect_timeout 20s;
        proxy_send_timeout 20s;
        proxy_read_timeout 30s;
        
        # Logging
        access_log /var/log/nginx/api_access.log;
        error_log /var/log/nginx/api_error.log warn;
    }

    # ====== HEALTH CHECK ENDPOINT ======
    location /health {
        access_log off;
        
        if ($request_method != GET) {
            return 405;
        }
        
        return 200 "Nginx is healthy\n";
        add_header Content-Type text/plain;
    }

    # ====== BACKEND HEALTH CHECK (Direct) ======
    location /backend-health {
        access_log off;
        proxy_pass http://backend_pool/actuator/health;
    }

    # ====== GZIP COMPRESSION ======
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript;
    gzip_min_length 1000;
    gzip_disable "msie6";
}